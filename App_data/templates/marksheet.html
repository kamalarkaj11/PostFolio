
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksheet</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        form {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        label {
            display: block;
            margin: 20px 0 8px;
            color: #555;
            font-weight: 600;
            text-align: left;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
            transform: translateY(-2px);
        }

        input[type="text"]::placeholder {
            color: #aaa;
            opacity: 1;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 30px 0;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        input[type="text"][value]:not([placeholder]) {
            background: linear-gradient(135deg, #d4f4dd, #a8e6cf);
            border-color: #56ab2f;
            font-weight: 600;
            color: #2d5a27;
        }

        a {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        @media (max-width: 600px) {
            form {
                padding: 30px 20px;
                margin: 10px;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>

</head>

<body>
    <form method="GET"> {% csrf_token %}
        <h1>Marksheet</h1>
        English <input type="text" name="English" id="English" placeholder="Enter Your Marks....">
        Math <input type="text" name="Math" id="Math" placeholder="Enter Your Marks....">
        Computer <input type="text" name="Computer" id="Computer" placeholder="Enter Your Marks....">
        Business Study <input type="text" name="Business" id="Business" placeholder="Enter Your Marks....">
        Account <input type="text" name="Account" id="Account" placeholder="Enter Your Marks....">
        <button type="submit"> Result </button>

        <input type="text" value="{{c}}"><br>
        <input type="text" value="{{d}}"><br>
        <input type="text" value="{{e}}"><br>


        <a href="/">Home</a>
    </form>

    
</body>

</html>
